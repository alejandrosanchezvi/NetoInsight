<!-- 📊 NetoInsight - Stocks Template -->

<app-loading-spinner 
  [show]="isLoading"
  [message]="'Cargando dashboard de Stocks para ' + getCurrentProviderName()"
  submessage="Aplicando filtros personalizados...">
</app-loading-spinner>

<div class="dashboard-container">
  <div class="tableau-container" [style.visibility]="showDashboard ? 'visible' : 'hidden'">
    <tableau-viz 
      #tableauViz
      id='tableau-viz-stocks' 
      [src]='tableauVizUrl'
      width='100%'
      height='1240'
      hide-tabs 
      toolbar='bottom'
      (firstinteractive)="onTableauLoad($event)"
      (error)="onTableauError($event)">
    </tableau-viz>
  </div>
</div>
