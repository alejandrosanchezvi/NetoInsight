<!-- 📊 NetoInsight - Categorization Template (ANCHO COMPLETO) -->

<div class="categorization-container">
  <!-- Header de la sección -->

  <!-- Loading Spinner -->
  <div *ngIf="isLoading" class="loading-overlay">
    <div class="spinner-container">
      <div class="spinner"></div>
      <p class="loading-text">Cargando dashboard...</p>
    </div>
  </div>

  <!-- Tableau Dashboard Container (ANCHO COMPLETO) -->
  <div class="tableau-container" [class.loading]="isLoading">
    <!-- 🔹 width='100%' para que ocupe todo el ancho disponible -->
    <tableau-viz 
      id='tableau-viz' 
      [src]='tableauVizUrl'
      width='100%'
      height='1240'
      hide-tabs 
      toolbar='bottom'
      (firstinteractive)="onTableauLoad($event)"
      (error)="onTableauError($event)">
    </tableau-viz>
  </div>

  <!-- Error Message (si hay problemas de carga) -->
  <div class="error-message" *ngIf="!isLoading && false">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" y1="8" x2="12" y2="12"></line>
      <line x1="12" y1="16" x2="12.01" y2="16"></line>
    </svg>
    <h3>Error al cargar el dashboard</h3>
    <p>No se pudo cargar la visualización de Tableau. Por favor, verifica tu conexión o contacta al administrador.</p>
    <button class="btn btn-primary" (click)="ngOnInit()">
      Reintentar
    </button>
  </div>
</div>
