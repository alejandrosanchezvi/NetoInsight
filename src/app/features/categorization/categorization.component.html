<!-- 📊 NetoInsight - Categorization Template (CON AUTENTICACIÓN) -->

<div class="categorization-container">
  
  <!-- Loading Spinner -->
  <div *ngIf="isLoading" class="loading-overlay">
    <div class="spinner-container">
      <div class="spinner"></div>
      <p class="loading-text">Cargando dashboard de {{ getCurrentProviderName() }}...</p>
    </div>
  </div>

  <!-- Auth Prompt (cuando hay error 401) -->
  <div *ngIf="showAuthPrompt && !isLoading" class="auth-prompt">
    <div class="auth-content">
      <svg class="auth-icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
      
      <h2 class="auth-title">Autenticación Requerida</h2>
      <p class="auth-message">
        Para acceder al dashboard de Tableau, necesitas autenticarte con tus credenciales de Tableau Server.
      </p>
      
      <button class="btn-auth" (click)="openTableauAuth()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M13.8 12H3"></path>
        </svg>
        Iniciar Sesión en Tableau
      </button>
      
      <p class="auth-hint">
        Se abrirá una ventana nueva. Después de autenticarte, cierra la ventana y el dashboard se cargará automáticamente.
      </p>
    </div>
  </div>

  <!-- Tableau Dashboard Container -->
  <div class="tableau-container" [class.loading]="isLoading" [class.hidden]="showAuthPrompt">
    <tableau-viz 
      #tableauViz
      id='tableau-viz' 
      [src]='tableauVizUrl'
      width='100%'
      height='1240'
      hide-tabs 
      toolbar='bottom'
      (firstinteractive)="onTableauLoad($event)"
      (error)="onTableauError($event)">
    </tableau-viz>
  </div>
</div>
