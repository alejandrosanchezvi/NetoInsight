<!-- 📊 NetoInsight - Categorization Template (EMBEDDING API v3 - ENHANCED) -->

<div class="categorization-container" [class.fullscreen]="isFullscreen">

  <!-- ===== DASHBOARD TOOLBAR ===== -->
  <div class="dashboard-toolbar" *ngIf="!authError && !isLoading">
    <div class="toolbar-left">
      <div class="dashboard-title">
        <svg class="icon-dashboard" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
        <span class="dashboard-name">Categorización</span>
      </div>
    </div>

    <div class="toolbar-right">
      <!-- Refresh Button -->
      <button 
        class="toolbar-btn" 
        (click)="refreshDashboard()" 
        [disabled]="isLoading"
        title="Refrescar dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <polyline points="23 4 23 10 17 10"></polyline>
          <polyline points="1 20 1 14 7 14"></polyline>
          <path d="m3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
        <span class="btn-text">Refrescar</span>
      </button>

      <!-- Export Menu -->
      <div class="export-menu-container">
        <button 
          class="toolbar-btn" 
          (click)="toggleExportMenu()"
          [class.active]="showExportMenu"
          title="Exportar dashboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          <span class="btn-text">Exportar</span>
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>

        <!-- Dropdown Menu -->
        <div class="export-dropdown" *ngIf="showExportMenu">
          <button class="export-option" (click)="exportToPDF()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <line x1="16" y1="13" x2="8" y2="13"></line>
              <line x1="16" y1="17" x2="8" y2="17"></line>
              <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            <span>Exportar como PDF</span>
          </button>

          <button class="export-option" (click)="exportToImage()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <circle cx="8.5" cy="8.5" r="1.5"></circle>
              <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
            <span>Exportar como Imagen</span>
          </button>

          <button class="export-option" (click)="exportData()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
              <polyline points="7.5 4.21 12 6.81 16.5 4.21"></polyline>
              <polyline points="7.5 19.79 7.5 14.6 3 12"></polyline>
              <polyline points="21 12 16.5 14.6 16.5 19.79"></polyline>
              <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
              <line x1="12" y1="22.08" x2="12" y2="12"></line>
            </svg>
            <span>Exportar Datos (CSV)</span>
          </button>
        </div>
      </div>

      <!-- Fullscreen Button -->
      <button 
        class="toolbar-btn" 
        (click)="toggleFullscreen()"
        [title]="isFullscreen ? 'Salir de pantalla completa' : 'Pantalla completa'">
        <svg *ngIf="!isFullscreen" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
        </svg>
        <svg *ngIf="isFullscreen" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path>
        </svg>
        <span class="btn-text">{{ isFullscreen ? 'Salir' : 'Pantalla completa' }}</span>
      </button>

      <!-- Debug Button (solo en desarrollo) -->
      <button 
        class="toolbar-btn toolbar-btn-secondary" 
        (click)="debugAuth()"
        title="Ver detalles de debug">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M12 1v6m0 6v6"></path>
        </svg>
      </button>
    </div>
  </div>

  <!-- ===== MENSAJE DE ERROR ===== -->
  <div *ngIf="authError" class="auth-error-message">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" y1="8" x2="12" y2="12"></line>
      <line x1="12" y1="16" x2="12.01" y2="16"></line>
    </svg>
    <div class="error-content">
      <strong>Error de Autenticación</strong>
      <p>{{ authError }}</p>
      <div class="error-actions">
        <button class="btn-retry" (click)="refreshDashboard()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="m3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
          Reintentar
        </button>
        <button class="btn-debug" (click)="debugAuth()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M12 1v6m0 6v6"></path>
          </svg>
          Ver Detalles
        </button>
      </div>
    </div>
  </div>

  <!-- ===== LOADING OVERLAY ===== -->
  <div *ngIf="isLoading && !authError" class="loading-overlay">
    <div class="spinner-container">
      <div class="spinner"></div>
      <p class="loading-text">Cargando dashboard para {{ getCurrentProviderName() }}...</p>
      <p class="loading-subtext">
        <span class="loading-step active">Conectando con tus datos</span>
        <span class="loading-step">•</span>
        <span class="loading-step">Personalizando visualización</span>
        <span class="loading-step">•</span>
        <span class="loading-step">Casi listo...</span>
      </p>
    </div>
  </div>

  <!-- ===== TABLEAU DASHBOARD CONTAINER ===== -->
  <div class="tableau-wrapper" [class.loading]="isLoading">
    <div #tableauContainer class="tableau-viz-container"></div>
  </div>

  <!-- ===== FULLSCREEN HINT ===== -->
  <div class="fullscreen-hint" *ngIf="isFullscreen">
    <span>Presiona <kbd>ESC</kbd> para salir de pantalla completa</span>
  </div>

</div>
