<!-- 🔐 NetoInsight - Login Template -->

<div class="login-container">
  <div class="login-card">
    
    <!-- Logo -->
    <div class="login-header">
      <img src="/assets/images/logoNeto.png" alt="Neto Logo" class="login-logo">
      <h1 class="login-title">NetoInsight</h1>
      <p class="login-subtitle">Portal de Proveedores</p>
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="alert-error">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      <span>{{ errorMessage }}</span>
    </div>

    <!-- Login Form -->
    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          class="form-input"
          placeholder="usuario@empresa.com"
          [disabled]="isLoading"
          autocomplete="email"
          required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          class="form-input"
          placeholder="••••••••"
          [disabled]="isLoading"
          autocomplete="current-password"
          required>
      </div>

      <button type="submit" class="btn-login" [disabled]="isLoading">
        <span *ngIf="!isLoading">Iniciar Sesión</span>
        <span *ngIf="isLoading" class="loading-text">
          <span class="spinner-sm"></span>
          Iniciando...
        </span>
      </button>
    </form>

    <!-- Footer -->
    <div class="login-footer">
      <p class="footer-text">© 2026 Neto. Todos los derechos reservados.</p>
    </div>
  </div>
</div>
