<!-- ⏱️ NetoInsight - Session Timeout Modal -->

<!-- WARNING: Sesión a punto de expirar -->
<div *ngIf="state.showWarning && !state.isExpired" class="session-backdrop">
    <div class="session-modal warning-modal">

        <!-- Icono con countdown circular -->
        <div class="countdown-ring">
            <svg width="100" height="100" viewBox="0 0 100 100">
                <!-- Track -->
                <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="6" />
                <!-- Progress -->
                <circle cx="50" cy="50" r="45" fill="none" stroke="url(#warningGrad)" stroke-width="6"
                    stroke-linecap="round" [attr.stroke-dasharray]="circumference"
                    [attr.stroke-dashoffset]="circleProgress" transform="rotate(-90 50 50)" />
                <defs>
                    <linearGradient id="warningGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#f58220" />
                        <stop offset="100%" stop-color="#e8743b" />
                    </linearGradient>
                </defs>
            </svg>
            <!-- Ícono central -->
            <div class="ring-icon">
                <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
            </div>
        </div>

        <!-- Textos -->
        <h2 class="modal-title">Sesión a punto de expirar</h2>
        <p class="modal-subtitle">
            Tu sesión cerrará automáticamente en
        </p>

        <!-- Countdown numérico -->
        <div class="time-display">
            <span class="time-number">{{ minutes }}:{{ seconds }}</span>
            <span class="time-label">minutos</span>
        </div>

        <p class="modal-hint">
            ¿Deseas continuar trabajando?
        </p>

        <!-- Acciones -->
        <div class="modal-actions">
            <button class="btn-extend" (click)="onExtend()">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M23 4v6h-6"></path>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
                Continuar sesión
            </button>
            <button class="btn-logout-warn" (click)="onLogout()">
                Cerrar sesión
            </button>
        </div>
    </div>
</div>

<!-- EXPIRED: Sesión expirada -->
<div *ngIf="state.isExpired" class="session-backdrop expired-backdrop">
    <div class="session-modal expired-modal">

        <!-- Ícono expirado -->
        <div class="expired-icon">
            <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="15" y1="9" x2="9" y2="15"></line>
                <line x1="9" y1="9" x2="15" y2="15"></line>
            </svg>
        </div>

        <h2 class="modal-title">Sesión expirada</h2>
        <p class="modal-subtitle">
            Tu sesión ha finalizado por inactividad.<br>
            Redirigiendo al inicio de sesión...
        </p>

        <!-- Barra de progreso de redirección -->
        <div class="redirect-bar">
            <div class="redirect-fill"></div>
        </div>
    </div>
</div>
