<!-- 📂 NetoInsight - Sidebar Template (MODO MINI) -->

<aside class="sidebar" 
       [class.sidebar-open]="isOpen"
       [class.mini]="!isOpen">
  
  <!-- Sidebar Header (solo móvil) -->
  <div class="sidebar-header">
    <h3 class="sidebar-title">Menú</h3>
    <button 
      class="sidebar-close"
      (click)="closeSidebar.emit()"
      aria-label="Cerrar menú">
      <svg width="25" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>

  <!-- Sidebar Navigation -->
  <nav class="sidebar-nav">
    <ul class="sidebar-menu">
      <li *ngFor="let item of menuItems" class="sidebar-menu-item">
        <button
          class="sidebar-link"
          [class.active]="isActive(item)"
          [attr.data-label]="item.label"
          (click)="navigateTo(item)"
          [attr.aria-current]="isActive(item) ? 'page' : null"
          [attr.title]="item.label">
          
          <!-- Icon -->
          <svg 
            class="sidebar-icon" 
            width="55" 
            height="22" 
            viewBox="0 0 10 24" 
            fill="none" 
            stroke="currentColor" 
            stroke-width="2" 
            stroke-linecap="round" 
            stroke-linejoin="round">
            <path [attr.d]="getIconPath(item.icon)"></path>
          </svg>

          <!-- Label (se oculta en modo mini) -->
          <span class="sidebar-label">{{ item.label }}</span>

          <!-- Badge (opcional) -->
          <span *ngIf="item.badge" class="sidebar-badge">
            {{ item.badge }}
          </span>
        </button>
      </li>
    </ul>
  </nav>
</aside>

<!-- Overlay para móvil -->
<div 
  class="sidebar-overlay" 
  [class.sidebar-overlay-active]="isOpen"
  (click)="closeSidebar.emit()"
  [attr.aria-hidden]="!isOpen">
</div>
