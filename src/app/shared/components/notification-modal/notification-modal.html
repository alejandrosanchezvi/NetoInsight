<!-- 🔔 NetoInsight - Notification Modal Template -->

<div *ngIf="notification" class="modal-backdrop" (click)="onBackdropClick($event)">
  <div class="notification-modal" [ngClass]="'modal-' + notification.type">
    
    <!-- Icon -->
    <div class="modal-icon" [ngClass]="'icon-' + notification.type">
      
      <!-- Success Icon -->
      <svg *ngIf="notification.type === 'success'" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M9 12l2 2 4-4"></path>
      </svg>

      <!-- Error Icon -->
      <svg *ngIf="notification.type === 'error'" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="15" y1="9" x2="9" y2="15"></line>
        <line x1="9" y1="9" x2="15" y2="15"></line>
      </svg>

      <!-- Warning Icon -->
      <svg *ngIf="notification.type === 'warning'" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
        <line x1="12" y1="9" x2="12" y2="13"></line>
        <line x1="12" y1="17" x2="12.01" y2="17"></line>
      </svg>

      <!-- Info Icon -->
      <svg *ngIf="notification.type === 'info'" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="16" x2="12" y2="12"></line>
        <line x1="12" y1="8" x2="12.01" y2="8"></line>
      </svg>

    </div>

    <!-- Content -->
    <div class="modal-content">
      <h2 class="modal-title">{{ notification.title }}</h2>
      <p class="modal-message">{{ notification.message }}</p>
    </div>

    <!-- Actions -->
    <div class="modal-actions">
      <button 
        *ngIf="notification.showCancel"
        class="btn-secondary"
        (click)="cancel()">
        {{ notification.cancelText || 'Cancelar' }}
      </button>
      
      <button 
        class="btn-primary"
        [ngClass]="'btn-' + notification.type"
        (click)="confirm()">
        {{ notification.confirmText || 'Entendido' }}
      </button>
    </div>

  </div>
</div>
