<!-- 🏠 NetoInsight - Main Layout Template (CON SESSION TIMEOUT) -->

<div class="main-layout">
  <!-- Header -->
  <app-header (toggleSidebar)="toggleSidebar()"></app-header>

  <!-- Sidebar -->
  <app-sidebar 
    [isOpen]="isSidebarOpen"
    [isInternalUser]="isInternalUser()"
    (closeSidebar)="closeSidebar()">
  </app-sidebar>

  <!-- Main Content Area -->
  <main class="main-content" [class.sidebar-mini]="!isSidebarOpen">
    <app-impersonation-banner></app-impersonation-banner>
    <div class="content-container">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>

<!-- ⏱️ Session Timeout Modal (warning + expired) -->
<app-session-timeout-modal></app-session-timeout-modal>
