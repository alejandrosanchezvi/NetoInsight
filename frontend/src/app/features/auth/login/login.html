<!-- 🔐 NetoInsight - Login Template (CON FORGOT PASSWORD) -->

<div class="login-wrapper">
  <!-- Animated Background -->
  <div class="animated-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Login Card -->
  <div class="login-card">
    <!-- Header -->
    <div class="login-header">
      <div class="brand-logo">
        <img src="/assets/images/logoNeto.png" alt="Neto" class="logo-img">
      </div>
      <h1 class="welcome-title">¡Bienvenido!</h1>
      <p class="welcome-subtitle">Ingresa a tu cuenta</p>
    </div>

    <!-- Error Alert -->
    <div *ngIf="errorMessage" class="error-alert">
      <div class="error-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
      </div>
      <span class="error-text">{{ errorMessage }}</span>
    </div>

    <!-- Formulario de Login Principal -->
    <form *ngIf="!showMfaStep" (ngSubmit)="onSubmit()" class="login-form">
      <!-- Email Input -->
      <div class="input-group">
        <label class="input-label">Email</label>
        <div class="input-container">
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            name="email"
            class="input-field"
            placeholder="tu@email.com"
            [disabled]="isLoading"
            autocomplete="email"
            required>
          <div class="input-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="4" width="20" height="16" rx="2"></rect>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
            </svg>
          </div>
        </div>
      </div>

      <!-- Password Input -->
      <div class="input-group">
        <div class="password-label-row">
          <label class="input-label">Contraseña</label>
          <!-- 🔑 Link de recuperación -->
          <button
            type="button"
            class="forgot-link"
            (click)="openForgotPassword()">
            ¿Olvidaste tu contraseña?
          </button>
        </div>
        <div class="input-container">
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            name="password"
            class="input-field"
            placeholder="••••••••"
            [disabled]="isLoading"
            autocomplete="current-password"
            required>
          <div class="input-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="5" y="11" width="14" height="10" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </div>
        </div>
      </div>

      <!-- Login Button -->
      <button type="submit" class="btn-submit" [disabled]="isLoading">
        <span *ngIf="!isLoading" class="btn-text">Iniciar Sesión</span>
        <span *ngIf="isLoading" class="btn-loading">
          <span class="loading-spinner"></span>
          <span>Iniciando...</span>
        </span>
      </button>
    </form>

    <!-- Formulario de Verificación MFA (TOTP) -->
    <form *ngIf="showMfaStep" (ngSubmit)="onMfaSubmit()" class="login-form mfa-form">
      <div class="mfa-instructions">
        <div class="mfa-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
            <line x1="12" y1="18" x2="12.01" y2="18"></line>
          </svg>
        </div>
        <h3>Verificación en 2 pasos</h3>
        <p>Abre tu aplicación de autenticación (ej. Google Authenticator) e ingresa el código de 6 dígitos.</p>
      </div>

      <div class="input-group">
        <label class="input-label text-center">Código de verificación</label>
        <div class="input-container code-container">
          <input
            id="mfaCode"
            type="text"
            [(ngModel)]="mfaCode"
            name="mfaCode"
            class="input-field code-input text-center tracking-widest text-xl font-mono"
            placeholder="000000"
            maxlength="6"
            pattern="\d{6}"
            [disabled]="isLoading"
            autocomplete="one-time-code"
            required>
        </div>
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading || mfaCode.length !== 6">
        <span *ngIf="!isLoading" class="btn-text">Verificar Código</span>
        <span *ngIf="isLoading" class="btn-loading">
          <span class="loading-spinner"></span>
          <span>Verificando...</span>
        </span>
      </button>

      <button type="button" class="btn-cancel-mfa" (click)="cancelMfa()" [disabled]="isLoading">
        Cancelar y volver atrás
      </button>
    </form>

    <!-- Footer -->
    <div class="card-footer">
      <p class="footer-text">© 2026 Neto. Todos los derechos reservados.</p>
    </div>
  </div>

  <!-- Floating Particles -->
  <div class="particles">
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
  </div>
</div>

  <!-- 🔑 Forgot Password Modal -->
  <app-forgot-password-modal
    *ngIf="showForgotPassword"
    (closeModal)="closeForgotPassword()">
  </app-forgot-password-modal>

  <!-- 🛡️ Force MFA Setup Modal -->
  <app-mfa-settings-modal
    *ngIf="showForceMfaModal"
    (closeModal)="closeForceMfaModal()">
  </app-mfa-settings-modal>
