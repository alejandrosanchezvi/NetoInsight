<!-- 🚫 NetoInsight - Subscription Suspended Page -->

<div class="suspended-page">

    <!-- Background decoration -->
    <div class="bg-decoration">
        <div class="bg-circle bg-circle-1"></div>
        <div class="bg-circle bg-circle-2"></div>
        <div class="bg-circle bg-circle-3"></div>
    </div>

    <!-- Card -->
    <div class="suspended-card">

        <!-- Logo -->
        <div class="logo-area">
            <div class="logo-badge">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>
            </div>
            <span class="logo-text">NetoInsight</span>
        </div>

        <!-- Icon según razón -->
        <div class="icon-area" [ngClass]="'icon-' + reason">
            <!-- Clock: trial expirado -->
            <svg *ngIf="content.icon === 'clock'" width="56" height="56" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <!-- Calendar: suscripción vencida -->
            <svg *ngIf="content.icon === 'calendar'" width="56" height="56" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
                <line x1="8" y1="14" x2="8.01" y2="14"></line>
            </svg>
            <!-- Pause: inactivo -->
            <svg *ngIf="content.icon === 'pause'" width="56" height="56" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="10" y1="15" x2="10" y2="9"></line>
                <line x1="14" y1="15" x2="14" y2="9"></line>
            </svg>
            <!-- Alert: error / desconocido -->
            <svg *ngIf="content.icon === 'alert'" width="56" height="56" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        </div>

        <!-- Texto -->
        <div class="text-area">
            <h1 class="title">{{ content.title }}</h1>
            <p class="subtitle">{{ content.subtitle }}</p>
            <p class="description">{{ content.description }}</p>
        </div>

        <!-- Info del usuario -->
        <div class="user-info" *ngIf="currentUser">
            <div class="user-row">
                <span class="user-label">Proveedor</span>
                <span class="user-value">{{ currentUser.tenantName }}</span>
            </div>
            <div class="user-row">
                <span class="user-label">Usuario</span>
                <span class="user-value">{{ currentUser.email }}</span>
            </div>
        </div>

        <!-- Acciones -->
        <div class="actions">
            <button class="btn-cta" (click)="onCta()" [disabled]="isLoggingOut">
                <svg *ngIf="content.ctaType === 'contact'" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                <svg *ngIf="content.ctaType === 'logout'" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                {{ isLoggingOut ? 'Cerrando sesión...' : content.ctaLabel }}
            </button>

            <button class="btn-logout" (click)="logout()" [disabled]="isLoggingOut">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Cerrar sesión
            </button>
        </div>

    </div>

</div>
