<!-- 👤 NetoInsight - User Menu Template -->

<div class="user-menu fade-in">
  <!-- User Info Header -->
  <div class="menu-header">
    <div class="menu-user-info">
      <div class="menu-user-avatar">
        <img 
          *ngIf="user.avatarUrl" 
          [src]="user.avatarUrl" 
          [alt]="user.name"
          class="avatar-image">
        <span *ngIf="!user.avatarUrl" class="avatar-initials">
          {{ user.name.split(' ')[0][0] }}{{ user.name.split(' ')[1]?.[0] || '' }}
        </span>
      </div>
      <div class="menu-user-details">
        <span class="menu-user-name">{{ user.name }}</span>
        <span class="menu-user-email">{{ user.email }}</span>
        <span class="menu-user-role">{{ user.tenantName }}</span>
      </div>
    </div>
  </div>

  <!-- Menu Items -->
  <div class="menu-items">
    <button 
      *ngFor="let item of menuItems"
      class="menu-item"
      [class.menu-item-danger]="item.danger"
      [class.menu-item-divider]="item.divider"
      (click)="onMenuItemClick(item)">
      
      <svg 
        class="menu-item-icon" 
        width="18" 
        height="18" 
        viewBox="0 0 24 24" 
        fill="none" 
        stroke="currentColor" 
        stroke-width="2" 
        stroke-linecap="round" 
        stroke-linejoin="round">
        <path [attr.d]="getIconPath(item.icon)"></path>
      </svg>
      
      <span class="menu-item-label">{{ item.label }}</span>
    </button>
  </div>

  <!-- Footer (opcional) -->
  <div class="menu-footer">
    <span class="menu-footer-text">NetoInsight v1.0</span>
  </div>
</div>
