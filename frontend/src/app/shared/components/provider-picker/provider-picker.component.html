<!-- 🎭 NetoInsight - Provider Picker Modal -->

<div class="picker-backdrop" (click)="close()"></div>

<div class="picker-modal">
  <div class="picker-header">
    <div class="picker-title-group">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span>Simular vista de proveedor</span>
    </div>
    <button class="picker-close" (click)="close()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="picker-search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" [(ngModel)]="search" (ngModelChange)="onSearch()"
           placeholder="Buscar por nombre, SIAN o correo..." autofocus />
  </div>

  <div class="picker-list">
    <div *ngIf="isLoading" class="picker-loading">Cargando proveedores...</div>

    <button *ngFor="let t of filtered" class="picker-item" (click)="select(t)">
      <div class="picker-item-info">
        <span class="picker-item-name">{{ t.name }}</span>
        <span class="picker-item-meta">{{ t.proveedorIdInterno }} · {{ t.adminEmail || 'Sin correo' }}</span>
      </div>
      <span class="picker-plan-badge" [class.badge-trial]="t.plan === 'trial'" [class.badge-starter]="t.plan === 'starter'">
        {{ t.plan }}
      </span>
    </button>

    <div *ngIf="!isLoading && filtered.length === 0" class="picker-empty">
      Sin resultados para "{{ search }}"
    </div>
  </div>

  <div class="picker-footer">
    {{ tenants.length }} proveedores con plan activo
  </div>
</div>
