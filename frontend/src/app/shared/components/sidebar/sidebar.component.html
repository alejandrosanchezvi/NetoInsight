<!-- 📂 NetoInsight - Sidebar Template (CON FILTRO DE PERMISOS) -->

<aside class="sidebar" 
       [class.sidebar-open]="isOpen"
       [class.mini]="!isOpen">
  
  <!-- Sidebar Header (solo móvil) -->
  <div class="sidebar-header">
    <h3 class="sidebar-title">Menú</h3>
    <button 
      class="sidebar-close"
      (click)="closeSidebar.emit()"
      aria-label="Cerrar menú">
      <svg width="25" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>

  <!-- Botón simular proveedor — solo NETO-INTERNAL admin -->
  <div class="sidebar-impersonate" *ngIf="isNetoAdmin()">
    <button class="btn-impersonate" [class.active]="impersonation.isActive" (click)="openProviderPicker()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span class="sidebar-label">
        {{ impersonation.isActive ? impersonation.current?.name : 'Simular proveedor' }}
      </span>
    </button>
  </div>

  <!-- Sidebar Navigation -->
  <nav class="sidebar-nav">
    <ul class="sidebar-menu">
      <li *ngFor="let item of menuItems" class="sidebar-menu-item">
        <!-- Usar shouldShowItem() en lugar de la condición anterior -->
        <button
          *ngIf="shouldShowItem(item)"
          class="sidebar-link"
          [class.active]="isActive(item)"
          (click)="navigateTo(item)">
          
          <!-- Icon -->
          <svg 
            class="sidebar-icon" 
            width="55" 
            height="22" 
            viewBox="0 0 10 24" 
            fill="none" 
            stroke="currentColor" 
            stroke-width="2" 
            stroke-linecap="round" 
            stroke-linejoin="round">
            <path [attr.d]="getIconPath(item.icon)"></path>
          </svg>

          <!-- Label (se oculta en modo mini) -->
          <span class="sidebar-label">{{ item.label }}</span>

          <!-- Badge (opcional) -->
          <span *ngIf="item.badge" class="sidebar-badge">
            {{ item.badge }}
          </span>
        </button>
      </li>
    </ul>
  </nav>
<app-trial-info></app-trial-info>
</aside>

<!-- Provider Picker Modal -->
<app-provider-picker
  *ngIf="showProviderPicker"
  (selected)="onProviderSelected($event)"
  (closed)="onPickerClosed()">
</app-provider-picker>

<!-- Overlay para móvil -->
<div 
  class="sidebar-overlay" 
  [class.sidebar-overlay-active]="isOpen"
  (click)="closeSidebar.emit()"
  [attr.aria-hidden]="!isOpen">
</div>
